<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杂货店登录</title>
    <!-- 引入css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="content">
        <div class="login-wrapper">
            <div class="left-img">
                <div class="glass">
                    <div class="tips">
                        <div class="title">
                            11解忧杂货
                        </div>
                        <h1 class="h1">有爱，有梦想</h1>
                        <span class="span1">去创造</span>
                        <span class="span1">我们邀请您加入我们杂货店</span>
                    </div>
                </div>
            </div>
            <div class="right-login-form">
                <div class="form-wrapper">
                    <h1 class="h2">登录界面</h1>
                </div>
                <div class="input-items">
                    <span class="input-tips">
                        账号
                    </span>
                    <input type="text" class="inputs" placeholder="请输入您的账号">
                </div>
                <div class="input-items">
                    <span class="input-tips">
                        密码
                    </span>
                    <input type="password" class="inputs" placeholder="请输入您的密码">
                    <span class="forgot">忘记密码?</span>
                </div>
                <a href="main-index/index.html"><button class="btn">登录</button></a>
                <div class="siginup-tips">
                    <span>没有账号?</span>
                    <span>注册</span>
                </div>
                <div class="other-login">
                    <div class="divider">
                        <span class="line"></span>
                        <span class="divider-text">or</span>
                        <span class="line"></span>
                    </div>
                    <div class="other-login-wrapper">
                        <div class="other-login-item">
                            <img src="./images/QQ.png" alt="" class="image">
                        </div>
                        <div class="other-login-item">
                            <img src="./images/wechat.png" alt="" class="image">
                        </div>

                    </div>

                </div>


            </div>
        </div>

    </div>
</body>

</html>
